<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>프로젝트 모음</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-50 min-h-screen">
    <div class="container mx-auto px-4 py-16 max-w-4xl">
        <div class="text-center mb-12">
            <h1 class="text-5xl font-bold text-gray-800 mb-4">🚀 프로젝트 모음</h1>
            <p class="text-gray-600 text-lg">다양한 웹 도구들을 모아놓은 공간입니다</p>
        </div>

        <div class="grid gap-6 md:grid-cols-2">
            <!-- YouTube Playlist Creator -->
            <a href="./youtube-playlist/" class="block group">
                <div class="bg-white rounded-2xl shadow-lg p-8 hover:shadow-2xl transition duration-300 transform hover:-translate-y-1">
                    <div class="flex items-center justify-between mb-4">
                        <div class="flex items-center">
                            <svg class="w-12 h-12 text-red-600 mr-3" fill="currentColor" viewBox="0 0 24 24">
                                <path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
                            </svg>
                            <h2 class="text-2xl font-bold text-gray-800">유튜브 플레이리스트 생성기</h2>
                        </div>
                        <svg class="w-6 h-6 text-gray-400 group-hover:text-red-600 transition" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                        </svg>
                    </div>
                    <p class="text-gray-600 mb-4">
                        텍스트에서 유튜브 링크를 자동으로 추출하고 플레이리스트를 생성하는 도구입니다.
                    </p>
                    <div class="flex flex-wrap gap-2">
                        <span class="px-3 py-1 bg-red-100 text-red-700 rounded-full text-sm">YouTube API</span>
                        <span class="px-3 py-1 bg-blue-100 text-blue-700 rounded-full text-sm">OAuth</span>
                        <span class="px-3 py-1 bg-green-100 text-green-700 rounded-full text-sm">링크 추출</span>
                    </div>
                </div>
            </a>

            <!-- Placeholder for future projects -->
            <div class="bg-white rounded-2xl shadow-lg p-8 opacity-50">
                <div class="flex items-center justify-between mb-4">
                    <div class="flex items-center">
                        <svg class="w-12 h-12 text-gray-400 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                        </svg>
                        <h2 class="text-2xl font-bold text-gray-400">곧 추가될 프로젝트</h2>
                    </div>
                </div>
                <p class="text-gray-400 mb-4">
                    새로운 도구가 추가될 예정입니다...
                </p>
            </div>
        </div>

        <div class="mt-12 text-center">
            <a href="https://github.com" target="_blank" class="inline-flex items-center text-gray-600 hover:text-gray-800 transition">
                <svg class="w-6 h-6 mr-2" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                </svg>
                GitHub에서 보기
            </a>
        </div>
    </div>

    <footer class="text-center py-8 text-gray-500 text-sm">
        <p>Made with ❤️</p>
    </footer>
</body>
</html>
